name: CI — hpc-audit

on:
  push:
    branches: [main]
    paths:
      - "crates/audit/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "codecov.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/audit/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "codecov.yml"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -p hpc-audit -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p hpc-audit --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run -p hpc-audit --all-features --no-tests=pass

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov -p hpc-audit --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: audit
          fail_ci_if_error: false

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, deny]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Set release version
        run: ./scripts/set-version.sh
      - name: Check if version already published
        id: check
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "hpc-audit") | .version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if cargo search hpc-audit --limit 1 | grep -q "hpc-audit = \"$VERSION\""; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not yet published"
          fi
      - name: Publish to crates.io
        if: steps.check.outputs.skip == 'false'
        run: cargo publish -p hpc-audit --allow-dirty --token ${{ secrets.CRATES_IO_TOKEN }}
