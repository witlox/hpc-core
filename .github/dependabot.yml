version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "13:00"
      timezone: Europe/Amsterdam
    groups:
      rust-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "13:00"
      timezone: Europe/Amsterdam
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
