# Per-crate commit count offsets for crates migrated from other repos.
# Format: crate-name=offset
# The release patch version = git commit count + offset.
# Add an entry when importing a crate whose last published patch number
# exceeds this repo's commit count at the time of import.
#
# Example: hpc-scheduler-core was at patch 92 in lattice, imported at
# commit 19 here, so offset = 92 - 19 = 73. Next publish (commit 20)
# will produce patch 93.
hpc-scheduler-core=73
